{% extends "base.html" %}
{% block title %}Sign In — Fitt with Pitt{% endblock %}

{% block content %}
<div class="auth-page">

    <a class="auth-logo" href="{{ url_for('login') }}">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Fitt with Pitt logo">
        <span class="auth-logo-text">Fitt with Pitt</span>
    </a>

    <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="auth-subtitle">Sign in to your account to continue</p>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username"
                       placeholder="Enter your username"
                       required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="Enter your password"
                       required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full" style="margin-top: 8px;">
                Sign in
            </button>
        </form>
    </div>

    <div class="auth-footer">
        Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
    </div>

</div>
{% endblock %}
